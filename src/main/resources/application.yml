spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountservicedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8081
logging:
  level:
    org.springframework.web: INFO
    com.ageeva.accountservice: DEBUG
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    doc-expansion: none