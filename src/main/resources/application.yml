spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountservicedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
logging:
  level:
    org.springframework.web: ERROR
    com.ageeva.accountservice: ERROR
    org.springframework.cache: ERROR